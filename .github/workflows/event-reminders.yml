name: Event Reminders

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  reminders:
    runs-on: ubuntu-latest
    env:
      DEFAULT_RENDER_PING_URL: https://tindereo.onrender.com
    steps:
      - name: Resolve app URL
        id: app-url
        env:
          RENDER_PING_URL: ${{ secrets.RENDER_PING_URL }}
        run: |
          if [ -n "$RENDER_PING_URL" ]; then
            echo "url=$RENDER_PING_URL" >> "$GITHUB_OUTPUT"
            echo "Usando URL definida en secret."
          else
            echo "url=$DEFAULT_RENDER_PING_URL" >> "$GITHUB_OUTPUT"
            echo "Usando URL por defecto: $DEFAULT_RENDER_PING_URL"
          fi

      - name: Trigger reminder job
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$CRON_SECRET" ]; then
            curl --fail --silent --show-error \
              --max-time 30 \
              --retry 3 \
              --retry-delay 5 \
              -X POST \
              -H "x-cron-secret: $CRON_SECRET" \
              "${{ steps.app-url.outputs.url }}/api/mobile/jobs/event-reminders"
          else
            echo "CRON_SECRET no definido en GitHub. Enviando sin cabecera."
            curl --fail --silent --show-error \
              --max-time 30 \
              --retry 3 \
              --retry-delay 5 \
              -X POST \
              "${{ steps.app-url.outputs.url }}/api/mobile/jobs/event-reminders"
          fi
