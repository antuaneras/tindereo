name: Event Reminders

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder job
        env:
          APP_URL: ${{ secrets.RENDER_PING_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Falta RENDER_PING_URL"
            exit 1
          fi

          curl --fail --silent --show-error \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            -X POST \
            -H "x-cron-secret: $CRON_SECRET" \
            "$APP_URL/api/mobile/jobs/event-reminders"
