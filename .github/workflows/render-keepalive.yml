name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest
    steps:
      - name: Check configuration
        if: ${{ secrets.RENDER_PING_URL == '' }}
        run: echo "Define el secret RENDER_PING_URL con la URL publica de Render, idealmente /api/health."

      - name: Ping Render
        if: ${{ secrets.RENDER_PING_URL != '' }}
        env:
          RENDER_PING_URL: ${{ secrets.RENDER_PING_URL }}
        run: curl --fail --silent --show-error --max-time 30 "$RENDER_PING_URL"
